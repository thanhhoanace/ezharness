# GoReleaser config — one `git tag vX.Y.Z` builds every platform, publishes a
# GitHub Release (binaries + checksums), and updates the Homebrew tap.
#   Local dry run: goreleaser release --snapshot --clean
# Owner = thanhhoanace (change here if the GitHub org moves).
version: 2
project_name: ezharness

builds:
  - id: ezh
    dir: "."                   # flat module: go.mod lives at repo root
    main: ./cmd/ezh
    binary: ezh
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: ezh
    formats: [tar.gz]
    name_template: "ezh_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Method 2: `brew install thanhhoanace/tap/ezharness`
# The formula is pushed to the separate thanhhoanace/homebrew-tap repo using the
# HOMEBREW_TAP_TOKEN PAT (the default GITHUB_TOKEN cannot write cross-repo); the
# token is wired in .github/workflows/release.yml.
brews:
  - name: ezharness
    repository:
      owner: thanhhoanace
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/thanhhoanace/ezharness"
    description: "Per-repo evidence gate for git — done means done."
    license: "MIT"
    install: |
      bin.install "ezh"
    test: |
      system "#{bin}/ezh", "version"

release:
  github:
    owner: thanhhoanace
    name: ezharness
  # Replace existing assets so a re-run (after fixing the brew token) is
  # idempotent instead of failing with "asset already_exists".
  mode: replace

changelog:
  use: github
  sort: asc
