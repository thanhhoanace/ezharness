name: release
# Method 3 (go install) needs no CI. This builds the binaries + Homebrew formula
# for methods 1 (curl|sh) and 2 (brew) on every semver tag.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT for pushing the Homebrew formula to thanhhoanace/homebrew-tap.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
